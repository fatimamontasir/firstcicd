name: Flutter CI/CD Release

on:
  push:
    branches:
      - main

# مهم جداً للسماح بالـ Release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ FIXED Flutter setup (هذا حل المشكلة عندك)
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false
          architecture: x64

      # 3️⃣ Verify Flutter works
      - name: Flutter version
        run: flutter --version

      - name: Flutter doctor
        run: flutter doctor -v

      # 4️⃣ Get dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5️⃣ Build APK
      - name: Build Release APK
        run: flutter build apk --release

      # 6️⃣ Check APK exists (debug safety)
      - name: Verify APK
        run: ls build/app/outputs/flutter-apk/

      # 7️⃣ Create GitHub Release + upload APK
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}